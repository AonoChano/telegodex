name: Bug report
description: Report a reproducible Telegodex problem
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that triggers the issue.
      placeholder: |
        1. Run ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact bot tokens, API keys, database paths, and user-private content before posting.
      render: text
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.9"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / Ubuntu 24.04 / macOS"