name: Feature request
description: Suggest a Telegodex improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should become easier or safer?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AI chat
        - Codex bridge
        - Telegram UI
        - Providers
        - Storage
        - Security
        - Documentation
        - Other