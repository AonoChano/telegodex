    <!-- 第4行：白色 █ (偶数行) -->
    <text x="-10" y="130">&#xA0;&#xA0;&#xA0;&#xA0;&#xA0;<tspan>██</tspan>║&#xA0;&#xA0;&#xA0;<tspan>██</tspan>╔══╝&#xA0;&#xA0;<tspan>██</tspan>║&#xA0;&#xA0;&#xA0;&#xA0;&#xA0;<tspan>██</tspan>╔══╝&#xA0;&#xA0;<tspan>██</tspan>║&#xA0;&#xA0;&#xA0;<tspan>██</tspan>║<tspan>██</tspan>║&#xA0;&#xA0;&#xA0;<tspan>██</tspan>║&#xA0;&#xA0;&#xA0;</text>
